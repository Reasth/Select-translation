name: Build macOS

# 在 GitHub 的 macOS runner 上打包 TranslatePopup.app 并封成 .dmg。
# 触发：手动（Actions 页面点 Run workflow）或推送 v* 标签。
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            arch: arm64
          - runner: macos-13
            arch: x86_64
    runs-on: ${{ matrix.runner }}
    name: build-${{ matrix.arch }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller

      - name: Generate app icon
        run: |
          mkdir -p build
          python3 gen_icon.py
          sips -s format icns icon.png --out build/AppIcon.icns
          ls -la build/AppIcon.icns

      - name: Build .app
        run: python -m PyInstaller --noconfirm TranslatePopup.spec

      - name: Pack .dmg
        run: |
          hdiutil create -volname "TranslatePopup" \
            -srcfolder "dist/TranslatePopup.app" \
            -ov -format UDZO \
            "TranslatePopup-${{ matrix.arch }}.dmg"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TranslatePopup-mac-${{ matrix.arch }}
          path: TranslatePopup-${{ matrix.arch }}.dmg
          if-no-files-found: error
