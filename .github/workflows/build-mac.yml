name: Build macOS

# 在 GitHub 的 macOS runner 上打包 TranslatePopup.app 并封成 .dmg。
# 触发：手动（Actions 页面点 Run workflow）或推送 v* 标签。
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            arch: arm64
          # macos-13 已被 GitHub 退役(任务会永远 queued),Intel 构建用 macos-15-intel
          - runner: macos-15-intel
            arch: x86_64
    runs-on: ${{ matrix.runner }}
    name: build-${{ matrix.arch }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller pillow

      - name: Build app icons (.icns + .ico) from artwork
        run: |
          mkdir -p build AppIcon.iconset
          sips -z 1024 1024 assets/AppIcon-src.png --out build/icon-1024.png
          for s in 16 32 128 256 512; do
            d=$((s * 2))
            sips -z $s $s build/icon-1024.png --out AppIcon.iconset/icon_${s}x${s}.png
            sips -z $d $d build/icon-1024.png --out AppIcon.iconset/icon_${s}x${s}@2x.png
          done
          iconutil -c icns AppIcon.iconset -o build/AppIcon.icns
          python scripts/make_ico.py
          ls -la build/

      - name: Build .app
        run: python -m PyInstaller --noconfirm TranslatePopup.spec

      - name: Pack .dmg
        run: |
          hdiutil create -volname "TranslatePopup" \
            -srcfolder "dist/TranslatePopup.app" \
            -ov -format UDZO \
            "TranslatePopup-${{ matrix.arch }}.dmg"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TranslatePopup-mac-${{ matrix.arch }}
          path: TranslatePopup-${{ matrix.arch }}.dmg
          if-no-files-found: error
